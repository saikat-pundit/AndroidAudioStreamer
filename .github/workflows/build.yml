name: Android Audio Streamer CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Prepare Logo
      run: |
        mkdir -p app/src/main/res/drawable
        if [ -f logo.png ]; then
          cp logo.png app/src/main/res/drawable/logo.png
        fi

    - name: Build with Gradle
      run: gradle assembleDebug  # Changed from ./gradlew to gradle

    # ADD THIS NEW STEP:
    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Streamer.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Audio-Streamer-App
        # UPDATE THIS PATH:
        path: app/build/outputs/apk/debug/Streamer.apk
