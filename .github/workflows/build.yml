name: Android Audio Streamer CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Prepare Logo
      run: |
        # Create the mipmap folder (standard for app icons)
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        # Rename logo.png to ic_launcher.png so Android treats it as the primary icon
        cp logo.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
    
    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Streamer.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Audio-Streamer-App
        path: app/build/outputs/apk/debug/Streamer.apk
