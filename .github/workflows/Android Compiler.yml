name: Android Audio Streamer CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Copy Logo
      run: cp logo.png app/src/main/res/drawable/logo.png

    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Streamer.apk

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: Android Latest App 
        files: |
          app/build/outputs/apk/debug/Streamer.apk
          source-code.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
